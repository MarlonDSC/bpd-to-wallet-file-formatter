# SonarCloud Configuration
# Update these values after setting up your SonarCloud project

# Project identification
sonar.projectKey=codeflow-dynamics_bpd-to-wallet-file-formatter
sonar.organization=codeflow-dynamics

# Project information
sonar.projectName=BPD to Wallet File Formatter
sonar.projectVersion=1.0.0
sonar.projectDescription=A React application to convert BPD CSV files to wallet format

# Source code paths
sonar.sources=src
sonar.tests=tests

# Test inclusions
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage configuration
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.config.ts,\
  **/*.config.js,\
  **/*.d.ts,\
  **/tests/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**

# File exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.config.ts,\
  **/*.config.js,\
  **/vite-env.d.ts,\
  **/*.test.ts,\
  **/*.test.tsx

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Quality gate settings
sonar.qualitygate.wait=true

# Source file encoding
sonar.sourceEncoding=UTF-8

# Language configuration
sonar.language=ts

# Code duplication
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx
